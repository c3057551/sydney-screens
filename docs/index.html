<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sydney Screens</title>
<meta name="theme-color" content="#171412">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Screens">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#171412; --panel:#221E1A; --panel2:#2A251F;
    --brass:#C8A45D; --cream:#EFE6D3; --dim:#97907F; --curtain:#A34233;
    --line:#3A332B;
  }
  *{box-sizing:border-box; margin:0}
  html{scrollbar-color:var(--line) var(--ink)}
  body{
    background:var(--ink); color:var(--cream);
    font-family:"Jost",system-ui,sans-serif; font-size:16px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}

  header{
    position:sticky; top:0; z-index:10; background:var(--ink);
    border-bottom:1px solid var(--line); padding:10px 14px 0;
  }
  .masthead{display:flex; align-items:baseline; gap:10px}
  .masthead h1{
    font-family:"Limelight",cursive; font-weight:400; font-size:1.35rem;
    color:var(--brass); letter-spacing:.04em;
  }
  .masthead .sub{color:var(--dim); font-size:.78rem; letter-spacing:.14em; text-transform:uppercase}

  .searchrow{margin:10px 0}
  .searchrow input{
    width:100%; padding:10px 14px; font:inherit; color:var(--cream);
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    outline:none;
  }
  .searchrow input:focus{border-color:var(--brass)}
  .searchrow input::placeholder{color:var(--dim)}

  .rail{
    display:flex; gap:6px; overflow-x:auto; padding:2px 0 10px;
    scrollbar-width:none;
  }
  .rail::-webkit-scrollbar{display:none}
  .rail button{
    flex:0 0 auto; padding:6px 12px; font:inherit; font-size:.85rem;
    color:var(--cream); background:var(--panel); border:1px solid var(--line);
    border-radius:999px; cursor:pointer; white-space:nowrap;
  }
  .rail button[aria-pressed="true"]{
    background:var(--brass); color:var(--ink); border-color:var(--brass); font-weight:600;
  }
  .rail button:focus-visible{outline:2px solid var(--brass); outline-offset:2px}
  .rail .spacer{flex:0 0 auto; width:1px; background:var(--line); margin:4px 4px}

  main{max-width:760px; margin:0 auto; padding:14px}

  .cinechips{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px}
  .cinechips button{
    padding:4px 10px; font:inherit; font-size:.75rem; letter-spacing:.03em;
    color:var(--dim); background:none; border:1px solid var(--line);
    border-radius:6px; cursor:pointer;
  }
  .cinechips button[aria-pressed="true"]{color:var(--cream); border-color:var(--brass)}

  .daylabel{
    color:var(--dim); font-size:.78rem; letter-spacing:.16em; text-transform:uppercase;
    margin:18px 0 10px; display:flex; align-items:center; gap:10px;
  }
  .daylabel::after{content:""; flex:1; height:1px; background:var(--line)}

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px; margin-bottom:12px; display:grid;
    grid-template-columns:64px 1fr; gap:12px;
  }
  .card.noimg{grid-template-columns:1fr}
  .poster{
    width:64px; height:92px; object-fit:cover; border-radius:6px;
    background:var(--panel2);
  }
  .card h2{font-size:1.02rem; font-weight:600; line-height:1.25}
  .filmlink{text-decoration:none}
  .filmlink:hover,.filmlink:focus-visible{color:var(--brass); outline:none}
  .card h2 .yr{color:var(--dim); font-weight:400}
  .meta{display:flex; flex-wrap:wrap; gap:6px; margin:5px 0 2px}
  .badge{
    font-size:.68rem; letter-spacing:.06em; padding:1px 7px;
    border:1px solid var(--line); border-radius:4px; color:var(--dim);
  }
  .badge.fmt{border-color:var(--brass); color:var(--brass)}
  .badge.retro{border-color:var(--curtain); color:#D98A7B}
  .venue{margin-top:9px}
  .venue .vname{font-size:.8rem; color:var(--dim); letter-spacing:.04em; margin-bottom:4px}
  .times{display:flex; flex-wrap:wrap; gap:6px}
  .stub{
    position:relative; display:inline-block; padding:5px 12px;
    background:var(--panel2); color:var(--cream); font-size:.85rem;
    text-decoration:none; border:1px solid var(--line); border-radius:3px;
  }
  .stub::before,.stub::after{
    content:""; position:absolute; top:50%; width:8px; height:8px;
    background:var(--panel); border:1px solid var(--line); border-radius:50%;
    transform:translateY(-50%);
  }
  .stub::before{left:-5px; border-left-color:transparent}
  .stub::after{right:-5px; border-right-color:transparent}
  .stub:hover,.stub:focus-visible{border-color:var(--brass); outline:none}
  .stub .t{font-weight:500}
  .stub .tag{color:var(--brass); font-size:.68rem; margin-left:5px; letter-spacing:.05em}
  .stub.past{opacity:.38}
  .soon{color:var(--dim); font-size:.85rem}

  .empty{color:var(--dim); text-align:center; padding:48px 0; font-size:.95rem}
  .empty b{color:var(--cream); font-weight:600}

  footer{
    max-width:760px; margin:0 auto; padding:8px 14px 40px;
    color:var(--dim); font-size:.76rem; border-top:1px solid var(--line);
  }
  footer .warn{color:#D98A7B}

  @media (min-width:560px){
    .masthead h1{font-size:1.6rem}
    .poster{width:76px; height:110px}
    .card{grid-template-columns:76px 1fr}
  }
  @media (prefers-reduced-motion:no-preference){
    .card{animation:rise .25s ease both}
    @keyframes rise{from{opacity:0; transform:translateY(4px)}to{opacity:1}}
  }
</style>
</head>
<body>
<header>
  <div class="masthead"><h1>Sydney Screens</h1><span class="sub">Session board</span></div>
  <div class="searchrow">
    <input id="q" type="search" placeholder="Search any film — e.g. Saving Private Ryan" autocomplete="off" aria-label="Search films">
  </div>
  <nav class="rail" id="rail" aria-label="Choose a day"></nav>
</header>

<main>
  <div class="cinechips" id="chips" aria-label="Filter by cinema"></div>
  <div id="results"></div>
</main>
<footer id="status"></footer>

<script>
"use strict";
const $=s=>document.querySelector(s);
let DATA=null, view={day:"today", cinemas:new Set(), q:""};

const fmtDay=d=>{
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/864e5);
  if(diff===0)return"Today"; if(diff===1)return"Tomorrow";
  return d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
};
const iso=d=>d.toISOString?d.toLocaleDateString("en-CA"):d;

async function boot(){
  try{
    DATA=await (await fetch("data/films.json",{cache:"no-store"})).json();
  }catch(e){
    $("#results").innerHTML='<div class="empty">Couldn\u2019t load session data. If this is the first deploy, run the scraper workflow once from the Actions tab.</div>';
    return;
  }
  buildRail(); buildChips(); wireSearch(); render(); renderStatus();
}

function dayList(){
  const days=[], seen=new Set();
  for(const f of DATA.films)for(const s of f.sessions)seen.add(s.dt.slice(0,10));
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<15;i++){
    const d=new Date(today); d.setDate(d.getDate()+i);
    if(seen.has(iso(d)))days.push(new Date(d));
  }
  return days;
}

function buildRail(){
  const rail=$("#rail"); rail.innerHTML="";
  const mk=(label,val)=>{
    const b=document.createElement("button");
    b.textContent=label; b.dataset.val=val;
    b.setAttribute("aria-pressed", String(view.day===val));
    b.onclick=()=>{view.day=val; view.q=""; $("#q").value="";
      rail.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",String(x===b)));
      render();};
    rail.appendChild(b); return b;
  };
  const days=dayList();
  days.forEach((d,i)=>mk(fmtDay(d), i===0&&fmtDay(d)==="Today"?"today":iso(d)));
  if(days.length&&fmtDay(days[0])!=="Today")rail.firstChild.dataset.val=iso(days[0]);
  const sp=document.createElement("span"); sp.className="spacer"; rail.appendChild(sp);
  mk("This week","week"); mk("Next week","nextweek"); mk("Coming soon","soon");
  const first=rail.querySelector("button");
  if(first&&![...rail.querySelectorAll("button")].some(b=>b.getAttribute("aria-pressed")==="true")){
    view.day=first.dataset.val; first.setAttribute("aria-pressed","true");
  }
}

function buildChips(){
  const box=$("#chips");
  for(const s of DATA.sources){
    const b=document.createElement("button");
    b.textContent=s.short; b.setAttribute("aria-pressed","false");
    b.onclick=()=>{
      view.cinemas.has(s.id)?view.cinemas.delete(s.id):view.cinemas.add(s.id);
      b.setAttribute("aria-pressed",String(view.cinemas.has(s.id)));
      render();
    };
    box.appendChild(b);
  }
}

function wireSearch(){
  let t; $("#q").addEventListener("input",e=>{
    clearTimeout(t); t=setTimeout(()=>{view.q=e.target.value.trim().toLowerCase(); render();},120);
  });
}

function inCinemas(f){return !view.cinemas.size||view.cinemas.has(f.cinema_id);}

function dateRange(){
  const today=new Date(); today.setHours(0,0,0,0);
  const day=v=>{const d=new Date(today); d.setDate(d.getDate()+v); return iso(d);};
  if(view.day==="today")return[day(0),day(0)];
  if(view.day==="week")return[day(0),day(6)];
  if(view.day==="nextweek"){
    const dow=(today.getDay()+6)%7;               // days since Monday
    return[day(7-dow),day(13-dow)];
  }
  if(view.day==="soon")return null;
  return[view.day,view.day];
}

const FMT_WORDS=/\b(70mm|35mm|4k|imax|digital|restoration)\b/gi;
const cleanTitle=t=>{
  const c=t.replace(FMT_WORDS,"").replace(/\s{2,}/g," ").replace(/^[\s:\-–]+|[\s:\-–]+$/g,"");
  return c||t;
};
function groupFilms(entries){
  const map=new Map();
  for(const f of entries){
    const g=map.get(f.group)||{title:cleanTitle(f.title),year:f.year,rating:f.rating,poster:f.poster,link:f.url||"",byCinema:new Map(),soonAt:new Set(),first:null};
    if(!g.link&&f.url)g.link=f.url;
    if(!g.poster&&f.poster)g.poster=f.poster;
    if(!g.year&&f.year)g.year=f.year;
    if(!g.rating&&f.rating)g.rating=f.rating;
    if(f._sessions&&f._sessions.length){
      const arr=g.byCinema.get(f.cinema_id)||[];
      arr.push(...f._sessions); g.byCinema.set(f.cinema_id,arr);
      for(const s of f._sessions)if(!g.first||s.dt<g.first)g.first=s.dt;
    }
    if(f.coming_soon)g.soonAt.add(f.cinema_id);
    g.fmt=g.fmt||new Set();
    for(const m of f.title.match(FMT_WORDS)||[])g.fmt.add(m.toUpperCase());
    map.set(f.group,g);
  }
  return[...map.values()].sort((a,b)=>(a.first||"9").localeCompare(b.first||"9")||a.title.localeCompare(b.title));
}

function filmTags(g){
  const tags=new Set(g.fmt||[]);
  for(const arr of g.byCinema.values())for(const s of arr)for(const t of s.tags||[])tags.add(t);
  return[...tags];
}

function render(){
  const out=$("#results");
  const cname=id=>(DATA.sources.find(s=>s.id===id)||{}).short||id;
  const nowIso=new Date().toLocaleString("sv-SE").slice(0,16).replace(" ","T");
  let entries;

  if(view.q){
    entries=DATA.films.filter(f=>inCinemas(f)&&f.title.toLowerCase().includes(view.q))
      .map(f=>({...f,_sessions:f.sessions}));
    out.innerHTML=entries.length?"":'<div class="empty">No sign of <b>'+esc(view.q)+'</b> at any of your cinemas — now showing or coming soon.</div>';
  }else if(view.day==="soon"){
    entries=DATA.films.filter(f=>inCinemas(f)&&f.coming_soon).map(f=>({...f,_sessions:[]}));
    out.innerHTML=entries.length?"":'<div class="empty">Nothing announced yet.</div>';
  }else{
    const[a,b]=dateRange();
    entries=DATA.films.map(f=>({...f,_sessions:f.sessions.filter(s=>{const d=s.dt.slice(0,10);return d>=a&&d<=b;})}))
      .filter(f=>inCinemas(f)&&f._sessions.length);
    out.innerHTML=entries.length?"":'<div class="empty">No sessions listed for this day yet.</div>';
  }
  if(!entries.length)return;

  const groups=groupFilms(entries);
  const showDates=view.q||view.day==="week"||view.day==="nextweek";
  let html="";
  for(const g of groups){
    const tags=filmTags(g);
    html+='<article class="card'+(g.poster?"":" noimg")+'">';
    const wrap=(inner)=>g.link?'<a href="'+esc(g.link)+'" target="_blank" rel="noopener" class="filmlink">'+inner+"</a>":inner;
    if(g.poster)html+=wrap('<img class="poster" src="'+esc(g.poster)+'" alt="" loading="lazy">');
    html+="<div>";
    html+="<h2>"+wrap(esc(g.title))+(g.year?' <span class="yr">('+g.year+")</span>":"")+"</h2>";
    if(g.rating||tags.length){
      html+='<div class="meta">';
      if(g.rating)html+='<span class="badge">'+esc(g.rating)+"</span>";
      for(const t of tags)html+='<span class="badge '+(t==="RETRO"||t==="CULT"?"retro":"fmt")+'">'+esc(t)+"</span>";
      html+="</div>";
    }
    for(const[cid,sessions]of g.byCinema){
      sessions.sort((x,y)=>x.dt.localeCompare(y.dt));
      html+='<div class="venue"><div class="vname">'+esc(cname(cid))+"</div><div class=\"times\">";
      for(const s of sessions){
        const past=s.dt<nowIso;
        const t=new Date(s.dt).toLocaleTimeString("en-AU",{hour:"numeric",minute:"2-digit"}).toLowerCase();
        const dpfx=showDates?'<span class="tag">'+new Date(s.dt).toLocaleDateString("en-AU",{weekday:"short",day:"numeric"})+"</span> ":"";
        const inner=dpfx+'<span class="t">'+t+"</span>"+(s.tags&&s.tags.length?'<span class="tag">'+s.tags.join(" ")+"</span>":"");
        html+=s.booking_url&&!past
          ?'<a class="stub" target="_blank" rel="noopener" href="'+esc(s.booking_url)+'">'+inner+"</a>"
          :'<span class="stub'+(past?" past":"")+'">'+inner+"</span>";
      }
      html+="</div></div>";
    }
    if(g.soonAt.size&&(view.q||view.day==="soon")){
      html+='<div class="venue"><div class="soon">Coming soon at '+[...g.soonAt].map(cname).map(esc).join(", ")+"</div></div>";
    }
    html+="</div></article>";
  }
  out.innerHTML=html;
}

function renderStatus(){
  const bad=DATA.sources.filter(s=>!s.ok);
  let t="Updated "+new Date(DATA.generated_at).toLocaleString("en-AU",{weekday:"short",hour:"numeric",minute:"2-digit",day:"numeric",month:"short"})+
    " · "+DATA.sources.length+" cinemas";
  if(bad.length)t+=' · <span class="warn">stale: '+bad.map(s=>esc(s.short)).join(", ")+"</span>";
  $("#status").innerHTML=t+" · Tap a time to book on the cinema\u2019s own site.";
}

const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
boot();
</script>
</body>
</html>
